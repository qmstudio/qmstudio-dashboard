<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QMStudio Dashboard - Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #ffd6e8 0%, #c9a3d9 25%, #a3c9e8 50%, #a3e8d9 75%, #d6f0c9 100%);
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
        }
        
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100"><filter id="noise"><feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="4" seed="2" /></filter><rect width="100" height="100" filter="url(%23noise)" opacity="0.3"/></svg>');
            background-size: 100px 100px;
            pointer-events: none;
            z-index: 1;
        }
        
        .container {
            background: transparent;
            max-width: 380px;
            width: 100%;
            padding: 40px 20px;
            position: relative;
            z-index: 2;
            text-align: center;
        }
        
        /* Floating paper frame */
        .form-box {
            background: rgba(245, 242, 235, 0.98);
            padding: 50px 45px;
            position: relative;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
            border-radius: 3px;
            /* Paper texture */
            background-image: 
                url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="300" height="300"><filter id="paperNoise"><feTurbulence type="fractalNoise" baseFrequency="0.7" numOctaves="6" seed="5" /></filter><rect width="300" height="300" filter="url(%23paperNoise)" opacity="0.08"/></svg>');
            background-size: 300px 300px;
        }
        
        h1 {
            font-family: 'Playfair Display', serif;
            color: #000000;
            font-size: 38px;
            font-weight: 400;
            letter-spacing: -0.5px;
            margin-bottom: 50px;
            line-height: 1.1;
        }
        
        .form-group {
            margin-bottom: 32px;
        }
        
        label {
            display: block;
            color: #000000;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            margin-bottom: 16px;
        }
        
        input {
            width: 100%;
            padding: 0;
            border: none;
            border-bottom: 1px solid #000000;
            background: transparent;
            font-size: 15px;
            color: #333;
            font-family: 'Inter', sans-serif;
            padding-bottom: 12px;
            transition: all 0.3s ease;
        }
        
        input::placeholder {
            color: #ccc;
        }
        
        input:focus {
            outline: none;
            border-bottom-color: #000000;
            border-bottom-width: 2px;
        }
        
        button {
            width: 100%;
            padding: 14px;
            background: transparent;
            color: #000000;
            border: 1.5px solid #000000;
            border-radius: 0;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 30px;
            font-family: 'Inter', sans-serif;
        }
        
        button:hover:not(:disabled) {
            background: #000000;
            color: white;
        }
        
        button:active:not(:disabled) {
            opacity: 0.8;
        }
        
        button:disabled {
            border-color: #e8e8e8;
            color: #ccc;
            cursor: not-allowed;
        }
        
        .toggle-auth {
            margin-top: 40px;
            font-size: 13px;
            color: #999;
        }
        
        .toggle-auth button {
            background: none;
            border: none;
            color: #000000;
            text-decoration: underline;
            cursor: pointer;
            padding: 0;
            margin: 0;
            font-size: 13px;
            font-weight: 600;
            transition: color 0.3s ease;
        }
        
        .toggle-auth button:hover {
            background: none;
            color: #555555;
        }
        
        .error {
            color: #c0392b;
            font-size: 12px;
            margin-top: 20px;
            padding: 12px;
            display: none;
            font-weight: 500;
        }
        
        .success {
            color: #27ae60;
            font-size: 12px;
            margin-top: 20px;
            padding: 12px;
            display: none;
            font-weight: 500;
        }
        
        .loading {
            display: none;
            text-align: center;
            color: #aaa;
            font-size: 12px;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="form-box">
            <h1>QMStudio Dashboard</h1>
            
            <div id="loginForm">
            <div class="form-group">
                <label for="loginEmail">Email</label>
                <input type="email" id="loginEmail" placeholder="your@email.com" required>
            </div>
            <div class="form-group">
                <label for="loginPassword">Password</label>
                <input type="password" id="loginPassword" placeholder="••••••••" required>
            </div>
            <button onclick="handleLogin()">Sign In</button>
            <div class="toggle-auth">
                Don't have an account? <button onclick="toggleAuth()">Sign Up</button>
            </div>
        </div>
        
        <div id="signupForm" style="display: none;">
            <div class="form-group">
                <label for="signupEmail">Email</label>
                <input type="email" id="signupEmail" placeholder="your@email.com" required>
            </div>
            <div class="form-group">
                <label for="signupPassword">Password</label>
                <input type="password" id="signupPassword" placeholder="••••••••" required>
            </div>
            <div class="form-group">
                <label for="signupName">Full Name</label>
                <input type="text" id="signupName" placeholder="Your Name" required>
            </div>
            <button onclick="handleSignup()">Create Account</button>
            <div class="toggle-auth">
                Already have an account? <button onclick="toggleAuth()">Sign In</button>
            </div>
        </div>
        
        <div class="error" id="errorMessage"></div>
        <div class="success" id="successMessage"></div>
        <div class="loading" id="loading">Loading...</div>
        </div>
    </div>
    
    <script>
        // Initialize Supabase
        const SUPABASE_URL = 'https://bhfbjefntsecfqlgepo.supabase.co';
        const SUPABASE_ANON_KEY = 'REPLACE_WITH_YOUR_ANON_KEY';
        
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        // Check if user is already logged in
        window.addEventListener('load', async () => {
            const { data: { user } } = await supabase.auth.getUser();
            if (user) {
                window.location.href = 'preview-FRESH.html';
            }
        });
        
        function toggleAuth() {
            document.getElementById('loginForm').style.display = 
                document.getElementById('loginForm').style.display === 'none' ? 'block' : 'none';
            document.getElementById('signupForm').style.display = 
                document.getElementById('signupForm').style.display === 'none' ? 'block' : 'none';
            clearMessages();
        }
        
        function showError(message) {
            const errorEl = document.getElementById('errorMessage');
            errorEl.textContent = message;
            errorEl.style.display = 'block';
            document.getElementById('successMessage').style.display = 'none';
        }
        
        function showSuccess(message) {
            const successEl = document.getElementById('successMessage');
            successEl.textContent = message;
            successEl.style.display = 'block';
            document.getElementById('errorMessage').style.display = 'none';
        }
        
        function clearMessages() {
            document.getElementById('errorMessage').style.display = 'none';
            document.getElementById('successMessage').style.display = 'none';
        }
        
        function setLoading(isLoading) {
            document.getElementById('loading').style.display = isLoading ? 'block' : 'none';
        }
        
        async function handleLogin() {
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            
            if (!email || !password) {
                showError('Please fill in all fields');
                return;
            }
            
            setLoading(true);
            clearMessages();
            
            try {
                const { data, error } = await supabase.auth.signInWithPassword({
                    email,
                    password
                });
                
                if (error) throw error;
                
                showSuccess('Login successful! Redirecting...');
                setTimeout(() => {
                    window.location.href = 'preview-FRESH.html';
                }, 1500);
            } catch (error) {
                showError(error.message);
            } finally {
                setLoading(false);
            }
        }
        
        async function handleSignup() {
            const email = document.getElementById('signupEmail').value;
            const password = document.getElementById('signupPassword').value;
            const name = document.getElementById('signupName').value;
            
            if (!email || !password || !name) {
                showError('Please fill in all fields');
                return;
            }
            
            if (password.length < 6) {
                showError('Password must be at least 6 characters');
                return;
            }
            
            setLoading(true);
            clearMessages();
            
            try {
                const { data, error } = await supabase.auth.signUp({
                    email,
                    password,
                    options: {
                        data: {
                            full_name: name
                        }
                    }
                });
                
                if (error) throw error;
                
                showSuccess('Account created! Check your email to confirm. Then you can sign in.');
                setTimeout(() => {
                    toggleAuth();
                }, 2000);
            } catch (error) {
                showError(error.message);
            } finally {
                setLoading(false);
            }
        }
    </script>
</body>
</html>
