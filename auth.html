<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QMStudio Dashboard - Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: linear-gradient(135deg, #ffd6e8 0%, #c9a3d9 25%, #a3c9e8 50%, #a3e8d9 75%, #d6f0c9 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .container { max-width: 380px; width: 100%; }
        .form-box { background: rgba(245, 242, 235, 0.98); padding: 50px 45px; box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15); border-radius: 3px; text-align: center; }
        h1 { font-family: 'Playfair Display', serif; color: #000; font-size: 38px; font-weight: 400; margin-bottom: 50px; }
        button { width: 100%; padding: 14px; background: transparent; color: #000; border: 1.5px solid #000; border-radius: 0; font-size: 11px; font-weight: 600; letter-spacing: 1.5px; text-transform: uppercase; cursor: pointer; transition: all 0.3s ease; font-family: 'Inter', sans-serif; margin-top: 30px; }
        button:hover { background: #000; color: white; }
        .error { color: #c0392b; font-size: 12px; margin-top: 20px; padding: 12px; display: none; background: rgba(192, 57, 43, 0.08); border-radius: 4px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="form-box">
            <h1>QMStudio Dashboard</h1>
            <button onclick="signInWithGoogle()">Sign In with Google</button>
            <div class="error" id="errorMessage"></div>
        </div>
    </div>

    <script async src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.7"></script>
    <script>
        let supabaseClient = null;
        function initSupabase() {
            if (!window.supabase) { setTimeout(initSupabase, 100); return; }
            supabaseClient = window.supabase.createClient('https://bhfbjefntsecfqlgepo.supabase.co', 'sb_publishable_felu1qhq2V9OeYc2_XAygQ_b5ku1K0M');
        }
        async function signInWithGoogle() {
            if (!supabaseClient) { return; }
            try {
                const { data, error } = await supabaseClient.auth.signInWithOAuth({
                    provider: 'google',
                    options: { redirectTo: 'https://qmstudio-dashboard.vercel.app/preview-FRESH.html' }
                });
                if (error) throw error;
            } catch (error) {
                document.getElementById('errorMessage').textContent = error.message || 'Sign in failed';
                document.getElementById('errorMessage').style.display = 'block';
            }
        }
        window.addEventListener('DOMContentLoaded', initSupabase);
    </script>
</body>
</html>
